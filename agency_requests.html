<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заявки | Кадровое агентство</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">HR CRM | Агентство</div>
        <div class="nav-menu">
            <a href="agency_dashboard.html">Главная</a>
            <a href="agency_requests.html" class="active">Заявки</a>
            <a href="agency_contracts.html">Договоры</a>
            <a href="agency_staff.html">Наш персонал</a>
            <a href="profile.html">Профиль</a>
            <a href="#" id="logoutBtn">Выход</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Заявки на внешний персонал</h1>
            <div class="stats-badge">
                <span class="badge badge-warning" id="newCount">0</span> новых
                <span class="badge badge-success" id="confirmedCount">0</span> подтвержденных
            </div>
        </div>

        <div id="errorMessage" class="alert alert-error" style="display: none;"></div>
        <div id="successMessage" class="alert alert-success" style="display: none;"></div>

        <!-- Фильтры -->
        <div class="card">
            <div class="filters">
                <select id="statusFilter">
                    <option value="">Все статусы</option>
                    <option value="sent">Отправлены</option>
                    <option value="confirmed">Подтверждены</option>
                    <option value="rejected">Отклонены</option>
                    <option value="completed">Выполнены</option>
                    <option value="cancelled">Отменены</option>
                </select>
                
                <select id="organizationFilter">
                    <option value="">Все магазины</option>
                </select>
                
                <select id="priorityFilter">
                    <option value="">Все приоритеты</option>
                    <option value="low">🟢 Низкий</option>
                    <option value="normal">🟡 Обычный</option>
                    <option value="high">🟠 Высокий</option>
                    <option value="urgent">🔴 Срочный</option>
                </select>
                
                <input type="date" id="dateFrom" placeholder="Дата с">
                <input type="date" id="dateTo" placeholder="Дата по">
                
                <button class="btn btn-primary" onclick="applyFilters()">🔍 Применить</button>
                <button class="btn btn-secondary" onclick="resetFilters()">🔄 Сбросить</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по должности, подразделению...">
            </div>
            
            <div id="requestsList"></div>
        </div>
    </div>

    <div id="rejectModal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
         background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
         z-index: 1000; width: 400px;">
        <h3>Отклонение заявки</h3>
        <div class="form-group">
            <label>Причина отклонения</label>
            <textarea id="rejectReason" rows="3" class="form-control" placeholder="Укажите причину..."></textarea>
        </div>
        <div class="form-actions">
            <button class="btn btn-danger" onclick="submitReject()">Отклонить</button>
            <button class="btn btn-secondary" onclick="closeRejectModal()">Отмена</button>
        </div>
    </div>
    <div id="modalOverlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999;"></div>

    <script src="js/utils.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }
        if (user.role !== 'agency') {
            const redirects = {
                'admin': 'dashboard.html',
                'shop_manager': 'shop_dashboard.html',
                'security': 'security_dashboard.html',
                'hr_specialist': 'hr_dashboard.html'
            };
            window.location.href = redirects[user.role] || 'dashboard.html';
        }

        let allRequests = [];
        let organizations = [];
        let currentRejectId = null;

        async function loadOrganizations() {
            try {
                const response = await fetch('api/organizations.php?active=1');
                organizations = await response.json();
                const filter = document.getElementById('organizationFilter');
                filter.innerHTML = '<option value="">Все магазины</option>' + 
                    organizations.map(o => `<option value="${o.id}">${escapeHtml(o.name)}</option>`).join('');
            } catch (error) {
                console.error('Ошибка загрузки магазинов:', error);
            }
        }

        async function loadRequests() {
            try {
                const response = await fetch(`api/staff_requests.php?role=agency&agency_id=${user.agency_id}`);
                allRequests = await response.json();
                updateStats();
                displayRequests(allRequests);
            } catch (error) {
                showError('Ошибка загрузки заявок');
            }
        }

        function updateStats() {
            const newCount = allRequests.filter(r => r.status === 'sent').length;
            const confirmedCount = allRequests.filter(r => r.status === 'confirmed').length;
            document.getElementById('newCount').textContent = newCount;
            document.getElementById('confirmedCount').textContent = confirmedCount;
        }

        function displayRequests(requests) {
            const container = document.getElementById('requestsList');
            
            if (requests.length === 0) {
                container.innerHTML = '<p class="alert alert-info">📭 Нет заявок</p>';
                return;
            }
            
            container.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>№ заявки</th>
                            <th>Магазин</th>
                            <th>Должность</th>
                            <th>Подразделение</th>
                            <th>Кол-во</th>
                            <th>Период</th>
                            <th>Приоритет</th>
                            <th>Статус</th>
                            <th>Дата создания</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${requests.map(r => `
                            <tr>
                                <td><strong>${r.request_number || 'б/н'}</strong></td>
                                <td>${escapeHtml(r.organization_name) || '-'}</td>
                                <td>${escapeHtml(r.position)}</td>
                                <td>${escapeHtml(r.department) || '-'}</td>
                                <td>${r.quantity} чел.</td>
                                <td>${r.start_date} - ${r.end_date || 'бессрочно'}</td>
                                <td>${getPriorityBadge(r.priority)}</td>
                                <td>${getStatusBadge(r.status)}</td>
                                <td>${formatDate(r.created_at)}</td>
                                <td class="actions">
                                    <button class="btn btn-sm btn-info" onclick="viewRequest(${r.id})">👁️</button>
                                    ${r.status === 'sent' ? `
                                        <button class="btn btn-sm btn-success" onclick="confirmRequest(${r.id})">✅ Подтвердить</button>
                                        <button class="btn btn-sm btn-danger" onclick="showRejectModal(${r.id})">❌ Отклонить</button>
                                    ` : ''}
                                    ${r.status === 'confirmed' ? `
                                        <button class="btn btn-sm btn-primary" onclick="viewSchedule(${r.id})">📅 График</button>
                                    ` : ''}
                                 </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function getPriorityBadge(priority) {
            const badges = {
                'low': '<span class="badge badge-info">🟢 Низкий</span>',
                'normal': '<span class="badge badge-info">🟡 Обычный</span>',
                'high': '<span class="badge badge-warning">🟠 Высокий</span>',
                'urgent': '<span class="badge badge-danger">🔴 Срочный</span>'
            };
            return badges[priority] || '<span class="badge badge-secondary">' + priority + '</span>';
        }

        function getStatusBadge(status) {
            const badges = {
                'draft': '<span class="badge badge-secondary">Черновик</span>',
                'sent': '<span class="badge badge-warning">Отправлена</span>',
                'confirmed': '<span class="badge badge-success">Подтверждена</span>',
                'rejected': '<span class="badge badge-danger">Отклонена</span>',
                'completed': '<span class="badge badge-info">Выполнена</span>',
                'cancelled': '<span class="badge badge-secondary">Отменена</span>'
            };
            return badges[status] || '<span class="badge badge-secondary">' + status + '</span>';
        }

        function viewRequest(id) {
            const request = allRequests.find(r => r.id == id);
            if (request) {
                const priorityText = {
                    'low': 'Низкий', 'normal': 'Обычный', 'high': 'Высокий', 'urgent': 'Срочный'
                };
                const statusText = {
                    'draft': 'Черновик', 'sent': 'Отправлена', 'confirmed': 'Подтверждена',
                    'rejected': 'Отклонена', 'completed': 'Выполнена', 'cancelled': 'Отменена'
                };
                alert(`
                    ЗАЯВКА №${request.request_number || 'б/н'}
                    
                    Магазин: ${request.organization_name || '-'}
                    Период: ${request.start_date} - ${request.end_date || 'бессрочно'}
                    Должность: ${request.position}
                    Подразделение: ${request.department || '-'}
                    Категория: ${request.category || '-'}
                    Количество: ${request.quantity} чел.
                    Приоритет: ${priorityText[request.priority] || request.priority}
                    Статус: ${statusText[request.status] || request.status}
                    Примечания: ${request.notes || 'нет'}
                    Создана: ${formatDate(request.created_at)}
                `);
            }
        }

        function viewSchedule(id) {
            window.open(`agency_schedule.html?request_id=${id}`, '_blank');
        }

        async function confirmRequest(id) {
            if (!confirm('Подтвердить эту заявку?')) return;
            
            try {
                const response = await fetch('api/staff_requests.php', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, status: 'confirmed' })
                });
                
                const result = await response.json();
                if (result.success) {
                    showSuccess('Заявка подтверждена');
                    loadRequests();
                } else {
                    showError(result.error || 'Ошибка подтверждения');
                }
            } catch (error) {
                showError('Ошибка подключения к серверу');
            }
        }

        function showRejectModal(id) {
            currentRejectId = id;
            document.getElementById('rejectModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
            document.getElementById('rejectReason').value = '';
        }

        function closeRejectModal() {
            currentRejectId = null;
            document.getElementById('rejectModal').style.display = 'none';
            document.getElementById('modalOverlay').style.display = 'none';
        }

        async function submitReject() {
            const reason = document.getElementById('rejectReason').value.trim();
            if (!reason) {
                showError('Укажите причину отклонения');
                return;
            }
            
            try {
                const response = await fetch('api/staff_requests.php', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        id: currentRejectId, 
                        status: 'rejected', 
                        rejected_reason: reason 
                    })
                });
                
                const result = await response.json();
                if (result.success) {
                    showSuccess('Заявка отклонена');
                    closeRejectModal();
                    loadRequests();
                } else {
                    showError(result.error || 'Ошибка отклонения');
                }
            } catch (error) {
                showError('Ошибка подключения к серверу');
            }
        }

        function applyFilters() {
            const status = document.getElementById('statusFilter').value;
            const orgId = document.getElementById('organizationFilter').value;
            const priority = document.getElementById('priorityFilter').value;
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = [...allRequests];
            
            if (status) filtered = filtered.filter(r => r.status === status);
            if (orgId) filtered = filtered.filter(r => r.organization_id == orgId);
            if (priority) filtered = filtered.filter(r => r.priority === priority);
            if (dateFrom) filtered = filtered.filter(r => r.start_date >= dateFrom);
            if (dateTo) filtered = filtered.filter(r => r.start_date <= dateTo);
            if (search) {
                filtered = filtered.filter(r => 
                    (r.position && r.position.toLowerCase().includes(search)) ||
                    (r.department && r.department.toLowerCase().includes(search)) ||
                    (r.request_number && r.request_number.toLowerCase().includes(search))
                );
            }
            
            displayRequests(filtered);
        }

        function resetFilters() {
            document.getElementById('statusFilter').value = '';
            document.getElementById('organizationFilter').value = '';
            document.getElementById('priorityFilter').value = '';
            document.getElementById('dateFrom').value = '';
            document.getElementById('dateTo').value = '';
            document.getElementById('searchInput').value = '';
            displayRequests(allRequests);
        }

        function exportToCSV() {
            const status = document.getElementById('statusFilter').value;
            const filtered = status ? allRequests.filter(r => r.status === status) : allRequests;
            
            if (filtered.length === 0) {
                showError('Нет данных для экспорта');
                return;
            }
            
            let csv = "№;Магазин;Должность;Подразделение;Количество;Период;Приоритет;Статус;Дата создания\n";
            filtered.forEach(r => {
                csv += `${r.request_number || 'б/н'};${r.organization_name || ''};${r.position};${r.department || ''};${r.quantity};${r.start_date} - ${r.end_date || 'бессрочно'};${r.priority};${r.status};${r.created_at}\n`;
            });
            
            const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `agency_requests_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            showSuccess('Экспорт выполнен');
        }

        function addExportButton() {
            const header = document.querySelector('.page-header');
            const exportBtn = document.createElement('button');
            exportBtn.className = 'btn btn-info';
            exportBtn.innerHTML = '📊 Экспорт CSV';
            exportBtn.onclick = exportToCSV;
            header.appendChild(exportBtn);
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        const firstDay = new Date();
        firstDay.setDate(1);
        document.getElementById('dateFrom').value = firstDay.toISOString().split('T')[0];
        document.getElementById('dateTo').value = new Date().toISOString().split('T')[0];

        loadOrganizations();
        loadRequests();
        addExportButton();
        
        setInterval(loadRequests, 30000);
    </script>

    <style>
        .stats-badge {
            display: flex;
            gap: 1rem;
            align-items: center;
            background: #f8f9fa;
            padding: 0.5rem 1rem;
            border-radius: 30px;
        }
        .stats-badge .badge {
            font-size: 1.1rem;
            padding: 0.3rem 0.8rem;
        }
        .time-input {
            width: 100px;
            padding: 0.3rem;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .btn-group {
            display: flex;
            gap: 0.3rem;
            flex-wrap: wrap;
        }
    </style>
</body>
</html>
