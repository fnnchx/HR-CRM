<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Добавление агентства | HR CRM</title>
    <link rel="stylesheet" href="./css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">HR CRM</div>
        <div class="nav-menu">
            <a href="dashboard.html">Главная</a>
            <a href="agencies.html" class="active">Агентства</a>
            <a href="contracts.html">Договоры</a>
            <a href="reports.html">Отчеты</a>
            <a href="profile.html">Профиль</a>
            <a href="#" id="logoutBtn">Выход</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Добавление агентства</h1>
            <button class="btn btn-secondary" onclick="window.location.href='agencies.html'">← Назад</button>
        </div>
        
        <div id="errorMessage" class="alert alert-error" style="display: none;"></div>
        <div id="successMessage" class="alert alert-success" style="display: none;"></div>
        
        <div class="card">
            <form id="agencyForm" onsubmit="event.preventDefault(); saveAgency();">
                <input type="hidden" id="agencyId">
                
                <h2>Основная информация</h2>
                
                <div class="form-group">
                    <label for="name">Название агентства *</label>
                    <input type="text" id="name" required>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email">
                    </div>
                    
                    <div class="form-group">
                        <label for="phone">Телефон</label>
                        <input type="text" id="phone" placeholder="+375291234567">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="contactPerson">Контактное лицо</label>
                        <input type="text" id="contactPerson">
                    </div>
                    
                    <div class="form-group">
                        <label for="contactPhone">Телефон контактного лица</label>
                        <input type="text" id="contactPhone">
                    </div>
                </div>
                
                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" id="isActive" checked> Активно
                    </label>
                </div>
                
                <h2 style="margin-top: 30px;">Реквизиты</h2>
                
                <div class="form-group">
                    <label for="bankName">Банк</label>
                    <input type="text" id="bankName">
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="unp">УНП</label>
                        <input type="text" id="unp">
                    </div>
                    
                    <div class="form-group">
                        <label for="okpo">ОКПО</label>
                        <input type="text" id="okpo">
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="form-group">
                        <label for="bic">БИК</label>
                        <input type="text" id="bic">
                    </div>
                    
                    <div class="form-group">
                        <label for="accountNumber">Расчетный счет</label>
                        <input type="text" id="accountNumber">
                    </div>
                </div>
                
                <div class="form-group">
                    <label for="legalAddress">Юридический адрес</label>
                    <textarea id="legalAddress" rows="3"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="directorName">Директор</label>
                    <input type="text" id="directorName">
                </div>
                
                <div class="form-group">
                    <label class="checkbox">
                        <input type="checkbox" id="isCurrent" checked> Это текущие реквизиты
                    </label>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Сохранить</button>
                    <button type="button" class="btn btn-secondary" onclick="window.location.href='agencies.html'">Отмена</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        async function saveAgency() {
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                contact_person: document.getElementById('contactPerson').value,
                contact_phone: document.getElementById('contactPhone').value,
                is_active: document.getElementById('isActive').checked ? 1 : 0
            };
            
            if (!data.name) {
                showError('Название агентства обязательно');
                return;
            }
            
            try {
                const response = await fetch('api/agencies.php', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.success) {
                    if (document.getElementById('bankName').value || 
                        document.getElementById('unp').value || 
                        document.getElementById('legalAddress').value) {
                        
                        const requisitesData = {
                            agency_id: result.id,
                            bank_name: document.getElementById('bankName').value,
                            unp: document.getElementById('unp').value,
                            okpo: document.getElementById('okpo').value,
                            bic: document.getElementById('bic').value,
                            account_number: document.getElementById('accountNumber').value,
                            legal_address: document.getElementById('legalAddress').value,
                            director_name: document.getElementById('directorName').value,
                            valid_from: getCurrentDate(),
                            is_current: document.getElementById('isCurrent').checked
                        };
                        
                        await fetch('api/requisites.php', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(requisitesData)
                        });
                    }
                    
                    showSuccess('Агентство добавлено');
                    setTimeout(() => {
                        window.location.href = 'agencies.html';
                    }, 1000);
                } else {
                    showError(result.error || 'Ошибка сохранения');
                }
            } catch (error) {
                showError('Ошибка подключения к серверу: ' + error.message);
            }
        }
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
