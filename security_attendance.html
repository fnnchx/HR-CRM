<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Отметка прихода/ухода | Охрана</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">HR CRM | Охрана</div>
        <div class="nav-menu">
            <a href="security_dashboard.html">Главная</a>
            <a href="security_schedule.html">График работы</a>
            <a href="security_attendance.html" class="active">Отметка прихода/ухода</a>
            <a href="security_requests.html">Заявки</a>
            <a href="security_reports.html">Отчеты</a>
            <a href="profile.html">Профиль</a>
            <a href="#" id="logoutBtn">Выход</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Отметка прихода и ухода сотрудников</h1>
            <div>
                <button class="btn btn-success" onclick="batchConfirm()">✓ Отметить всех присутствующих</button>
            </div>
        </div>

        <div class="card">
            <div class="filters">
                <select id="statusFilter">
                    <option value="all">Все сотрудники</option>
                    <option value="pending">Ожидают отметки</option>
                    <option value="confirmed">Уже отмечены</option>
                </select>
                <button class="btn btn-primary" onclick="applyFilter()">Применить</button>
            </div>
            
            <div id="attendanceList"></div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        const user = checkAuth();
        if (user.role !== 'security') window.location.href = 'dashboard.html';
        
        let allSchedules = [];

        async function loadAttendance() {
            const response = await fetch(`api/work_schedule.php?organization_id=${user.organization_id}&date=${new Date().toISOString().split('T')[0]}`);
            allSchedules = await response.json();
            displayAttendance(allSchedules);
        }

        function displayAttendance(schedules) {
            const container = document.getElementById('attendanceList');
            
            if (schedules.length === 0) {
                container.innerHTML = '<p class="alert alert-info">Сегодня нет запланированных выходов</p>';
                return;
            }
            
            container.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Сотрудник</th>
                            <th>Должность</th>
                            <th>Агентство</th>
                            <th>План</th>
                            <th>Время прихода</th>
                            <th>Время ухода</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${schedules.map(s => `
                            <tr>
                                <td><strong>${s.full_name}</strong></td>
                                <td>${s.position || '-'}</td>
                                <td>${s.agency_name || '-'}</td>
                                <td>${s.planned_start || '-'} - ${s.planned_end || '-'}</td>
                                <td>
                                    <input type="time" id="start_${s.id}" value="${s.actual_start || ''}" 
                                           ${s.actual_start ? 'disabled' : ''} class="time-input">
                                </td>
                                <td>
                                    <input type="time" id="end_${s.id}" value="${s.actual_end || ''}" 
                                           ${s.actual_end ? 'disabled' : ''} class="time-input">
                                </td>
                                <td class="actions">
                                    ${!s.actual_start ? `
                                        <button class="btn btn-sm btn-success" onclick="markArrival(${s.id})">
                                            🚪 Приход
                                        </button>
                                    ` : ''}
                                    ${!s.actual_end && s.actual_start ? `
                                        <button class="btn btn-sm btn-warning" onclick="markDeparture(${s.id})">
                                            🚶 Уход
                                        </button>
                                    ` : ''}
                                    ${s.actual_start && s.actual_end ? `
                                        <span class="badge badge-success">✓ Отмечен</span>
                                    ` : ''}
                                 </td>
                            </td>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function markArrival(id) {
            const now = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
            
            await fetch('api/work_schedule.php', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: id,
                    actual_start: now,
                    status: 'confirmed',
                    confirmed_by: user.id
                })
            });
            
            showSuccess('Приход отмечен');
            loadAttendance();
        }

        async function markDeparture(id) {
            const now = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
            
            // Получаем текущую запись
            const schedule = allSchedules.find(s => s.id === id);
            
            await fetch('api/work_schedule.php', {
                method: 'PUT',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    id: id,
                    actual_start: schedule.actual_start,
                    actual_end: now,
                    status: 'confirmed',
                    confirmed_by: user.id
                })
            });
            
            showSuccess('Уход отмечен');
            loadAttendance();
        }

        async function batchConfirm() {
            const pending = allSchedules.filter(s => !s.actual_start);
            if (pending.length === 0) {
                showError('Нет сотрудников для отметки');
                return;
            }
            
            const now = new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
            
            for (const s of pending) {
                await fetch('api/work_schedule.php', {
                    method: 'PUT',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        id: s.id,
                        actual_start: now,
                        status: 'confirmed',
                        confirmed_by: user.id
                    })
                });
            }
            
            showSuccess(`Отмечено ${pending.length} сотрудников`);
            loadAttendance();
        }

        function applyFilter() {
            const filter = document.getElementById('statusFilter').value;
            
            if (filter === 'all') {
                displayAttendance(allSchedules);
            } else if (filter === 'pending') {
                displayAttendance(allSchedules.filter(s => !s.actual_start));
            } else if (filter === 'confirmed') {
                displayAttendance(allSchedules.filter(s => s.actual_start));
            }
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        loadAttendance();
        setInterval(loadAttendance, 60000); // Обновление каждую минуту
    </script>
</body>
</html>
