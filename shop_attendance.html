<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение выхода | Заведующий</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">HR CRM | Заведующий</div>
        <div class="nav-menu">
            <a href="shop_dashboard.html">Главная</a>
            <a href="shop_requests.html">Заявки</a>
            <a href="shop_schedule.html">График работы</a>
            <a href="shop_attendance.html" class="active">Подтверждение выхода</a>
            <a href="shop_reconciliation.html">Акты сверки</a>
            <a href="shop_reports.html">Отчеты</a>
            <a href="profile.html">Профиль</a>
            <a href="#" id="logoutBtn">Выход</a>
        </div>
    </div>

    <div class="container">
        <h1>Подтверждение прихода/ухода сотрудников</h1>
        
        <div class="card">
            <div class="filters">
                <input type="date" id="datePicker">
                <button class="btn btn-primary" onclick="loadAttendance()">Показать</button>
                <button class="btn btn-success" onclick="batchConfirm()">✓ Отметить всех присутствующих</button>
            </div>
            <div id="attendanceList"></div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user || user.role !== 'shop_manager') window.location.href = 'login.html';

        document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];

        async function loadAttendance() {
            const date = document.getElementById('datePicker').value;
            const res = await fetch(`api/work_schedule.php?organization_id=${user.organization_id}&date=${date}`);
            const schedules = await res.json();
            displayAttendance(schedules);
        }

        function displayAttendance(schedules) {
            const container = document.getElementById('attendanceList');
            if (schedules.length === 0) {
                container.innerHTML = '<p class="alert alert-info">Нет запланированных выходов</p>';
                return;
            }
            container.innerHTML = `
                <table class="table">
                    <thead>
                        <tr><th>Сотрудник</th><th>Должность</th><th>План</th><th>Факт прихода</th><th>Факт ухода</th><th>Действия</th></tr>
                    </thead>
                    <tbody>
                        ${schedules.map(s => `
                            <tr>
                                <td>${s.staff_name || s.full_name}</td>
                                <td>${s.position || '-'}</td>
                                <td>${s.planned_start || '-'} - ${s.planned_end || '-'}</td>
                                <td><input type="time" id="start_${s.id}" value="${s.actual_start || ''}" class="time-input"></td>
                                <td><input type="time" id="end_${s.id}" value="${s.actual_end || ''}" class="time-input"></td>
                                <td><button class="btn btn-sm btn-success" onclick="confirmAttendance(${s.id})">✓ Подтвердить</button></td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function confirmAttendance(id) {
            const actualStart = document.getElementById(`start_${id}`).value;
            const actualEnd = document.getElementById(`end_${id}`).value;
            await fetch('api/work_schedule.php', {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, actual_start: actualStart, actual_end: actualEnd, status: 'confirmed', confirmed_by: user.id })
            });
            showSuccess('Данные сохранены');
            loadAttendance();
        }

        async function batchConfirm() {
            const date = document.getElementById('datePicker').value;
            const res = await fetch(`api/work_schedule.php?organization_id=${user.organization_id}&date=${date}`);
            const schedules = await res.json();
            const pending = schedules.filter(s => !s.actual_start);
            if (pending.length === 0) { showError('Нет сотрудников для отметки'); return; }
            const now = new Date().toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            for (const s of pending) {
                await fetch('api/work_schedule.php', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: s.id, actual_start: now, status: 'confirmed', confirmed_by: user.id })
                });
            }
            showSuccess(`Отмечено ${pending.length} сотрудников`);
            loadAttendance();
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => { e.preventDefault(); logout(); });
        loadAttendance();
    </script>
</body>
</html>
