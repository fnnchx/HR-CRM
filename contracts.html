<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Договоры | HR CRM</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">HR CRM</div>
        <div class="nav-menu">
            <a href="dashboard.html">Главная</a>
            <a href="agencies.html">Агентства</a>
            <a href="contracts.html" class="active">Договоры</a>
            <a href="reports.html">Отчеты</a>
            <a href="profile.html">Профиль</a>
            <a href="#" id="logoutBtn">Выход</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Договоры</h1>
            <button class="btn btn-success" onclick="window.location.href='contract-add.html'">+ Создать договор</button>
        </div>
        
        <div id="errorMessage" class="alert alert-error" style="display: none;"></div>
        
        <div class="card">
            <div class="filters">
                <select id="statusFilter">
                    <option value="">Все статусы</option>
                    <option value="active">Активные</option>
                    <option value="draft">Черновики</option>
                    <option value="expired">Истекшие</option>
                    <option value="terminated">Расторгнутые</option>
                </select>
                
                <select id="agencyFilter">
                    <option value="">Все агентства</option>
                </select>
                
                <input type="date" id="dateFrom" placeholder="Дата с">
                <input type="date" id="dateTo" placeholder="Дата по">
                
                <button class="btn btn-primary" onclick="applyFilters()">Применить</button>
                <button class="btn btn-secondary" onclick="resetFilters()">Сбросить</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по номеру или агентству...">
            </div>
            
            <table class="table">
                <thead>
                    <tr>
                        <th>Номер</th>
                        <th>Агентство</th>
                        <th>Дата подписания</th>
                        <th>Срок действия</th>
                        <th>Сумма</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="contractsList">
                    <tr>
                        <td colspan="7" class="text-center">Загрузка...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }

        let contracts = [];
        let agencies = [];

        async function loadData() {
            try {
                const agenciesRes = await fetch('api/agencies.php');
                agencies = await agenciesRes.json();
                
                const agencyFilter = document.getElementById('agencyFilter');
                agencies.forEach(a => {
                    const option = document.createElement('option');
                    option.value = a.id;
                    option.textContent = a.name;
                    agencyFilter.appendChild(option);
                });
                
                await loadContracts();
                
            } catch (error) {
                document.getElementById('errorMessage').textContent = 'Ошибка загрузки данных';
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        async function loadContracts() {
            try {
                const response = await fetch('api/contracts.php');
                contracts = await response.json();
                displayContracts(contracts);
            } catch (error) {
                document.getElementById('errorMessage').textContent = 'Ошибка загрузки договоров';
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        function displayContracts(data) {
            const tbody = document.getElementById('contractsList');
            
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" class="text-center">Нет данных</td></tr>';
                return;
            }
            
            tbody.innerHTML = data.map(c => {
                const today = new Date();
                const expDate = new Date(c.expiration_date);
                const daysLeft = Math.floor((expDate - today) / (1000 * 60 * 60 * 24));
                
                return `
                <tr>
                    <td><strong>${escapeHtml(c.number) || 'Б/Н'}</strong></td>
                    <td>${escapeHtml(c.agency_name) || '-'}</td>
                    <td>${c.signing_date || '-'}</td>
                    <td>
                        ${c.expiration_date || 'Бессрочно'}
                        ${c.status === 'active' && daysLeft > 0 && daysLeft < 30 ? 
                            `<span class="badge badge-warning">${daysLeft} дн.</span>` : ''}
                    </td>
                    <td>${formatMoney(c.total_amount)}</td>
                    <td><span class="badge badge-${c.status}">${getStatusText(c.status)}</span></td>
                    <td class="actions">
                        <button class="btn btn-sm btn-info" onclick="viewContract(${c.id})">👁️</button>
                        <button class="btn btn-sm btn-warning" onclick="editContract(${c.id})">✏️</button>
                        <button class="btn btn-sm btn-primary" onclick="printContract(${c.id})">🖨️</button>
                        <button class="btn btn-sm btn-danger" onclick="deleteContract(${c.id})">🗑️</button>
                    </td>
                </tr>
            `}).join('');
        }

        function applyFilters() {
            const status = document.getElementById('statusFilter').value;
            const agencyId = document.getElementById('agencyFilter').value;
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = contracts;
            
            if (status) {
                filtered = filtered.filter(c => c.status === status);
            }
            
            if (agencyId) {
                filtered = filtered.filter(c => c.agency_id == agencyId);
            }
            
            if (dateFrom) {
                filtered = filtered.filter(c => c.signing_date >= dateFrom);
            }
            
            if (dateTo) {
                filtered = filtered.filter(c => c.signing_date <= dateTo);
            }
            
            if (search) {
                filtered = filtered.filter(c => 
                    (c.number && c.number.toLowerCase().includes(search)) ||
                    (c.agency_name && c.agency_name.toLowerCase().includes(search))
                );
            }
            
            displayContracts(filtered);
        }

        // Сброс фильтров
        function resetFilters() {
            document.getElementById('statusFilter').value = '';
            document.getElementById('agencyFilter').value = '';
            document.getElementById('dateFrom').value = '';
            document.getElementById('dateTo').value = '';
            document.getElementById('searchInput').value = '';
            displayContracts(contracts);
        }

        // Поиск при вводе
        document.getElementById('searchInput').addEventListener('input', applyFilters);

        // Действия
        function viewContract(id) {
            window.location.href = `contract-view.html?id=${id}`;
        }

        function editContract(id) {
            window.location.href = `contract-edit.html?id=${id}`;
        }

        function printContract(id) {
            window.location.href = `contract-print.html?id=${id}`;
        }

        async function deleteContract(id) {
            if (!confirm('Вы уверены, что хотите удалить договор?')) return;
            
            try {
                const response = await fetch(`api/contracts.php?id=${id}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                
                if (result.success) {
                    loadContracts();
                } else {
                    document.getElementById('errorMessage').textContent = result.error || 'Ошибка удаления';
                    document.getElementById('errorMessage').style.display = 'block';
                }
            } catch (error) {
                document.getElementById('errorMessage').textContent = 'Ошибка подключения к серверу';
                document.getElementById('errorMessage').style.display = 'block';
            }
        }

        function formatMoney(amount) {
            return new Intl.NumberFormat('ru-RU', { style: 'currency', currency: 'RUB' }).format(amount || 0);
        }

        function getStatusText(status) {
            const statuses = {
                'active': 'Активен',
                'draft': 'Черновик',
                'expired': 'Истек',
                'terminated': 'Расторгнут'
            };
            return statuses[status] || status;
        }

        function escapeHtml(text) {
            if (!text) return text;
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });

        loadData();
    </script>
</body>
</html>
