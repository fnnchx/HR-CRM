<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Шаблоны договоров | HR CRM</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">HR CRM</div>
        <div class="nav-menu">
            <a href="dashboard.html">Главная</a>
            <a href="agencies.html">Агентства</a>
            <a href="contracts.html">Договоры</a>
            <a href="reports.html">Отчеты</a>
            <a href="profile.html">Профиль</a>
            <a href="#" id="logoutBtn">Выход</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Шаблоны договоров</h1>
            <button class="btn btn-success" onclick="window.location.href='template-add.html'">+ Создать шаблон</button>
        </div>
        
        <div id="errorMessage" class="alert alert-error" style="display: none;"></div>
        
        <div class="card">
            <table class="table">
                <thead>
                    <tr>
                        <th>Название</th>
                        <th>Тип</th>
                        <th>Дата создания</th>
                        <th>Статус</th>
                        <th>Действия</th>
                    </tr>
                </thead>
                <tbody id="templatesList">
                    <tr><td colspan="5" class="text-center">Загрузка...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script src="js/templates.js"></script>
    <script>
        const user = checkAuth();
        loadTemplates();
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });
    </script>
</body>
</html>
