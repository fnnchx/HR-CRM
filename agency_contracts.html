<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Договоры | Кадровое агентство</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">HR CRM | Агентство</div>
        <div class="nav-menu">
            <a href="agency_dashboard.html">Главная</a>
            <a href="agency_requests.html">Заявки</a>
            <a href="agency_contracts.html" class="active">Договоры</a>
            <a href="agency_staff.html">Наш персонал</a>
            <a href="profile.html">Профиль</a>
            <a href="#" id="logoutBtn">Выход</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Договоры с заказчиками</h1>
            <div class="stats-badge">
                <span class="badge badge-success" id="activeCount">0</span> активных
                <span class="badge badge-warning" id="expiringCount">0</span> истекают скоро
            </div>
        </div>

        <div id="errorMessage" class="alert alert-error" style="display: none;"></div>
        <div id="successMessage" class="alert alert-success" style="display: none;"></div>

        <!-- Фильтры -->
        <div class="card">
            <div class="filters">
                <select id="statusFilter">
                    <option value="">Все статусы</option>
                    <option value="active">Активные</option>
                    <option value="draft">Черновики</option>
                    <option value="expired">Истекшие</option>
                    <option value="terminated">Расторгнутые</option>
                </select>
                
                <input type="date" id="dateFrom" placeholder="Дата с">
                <input type="date" id="dateTo" placeholder="Дата по">
                
                <button class="btn btn-primary" onclick="applyFilters()">🔍 Применить</button>
                <button class="btn btn-secondary" onclick="resetFilters()">🔄 Сбросить</button>
                <button class="btn btn-info" onclick="exportToCSV()">📊 Экспорт CSV</button>
            </div>
            
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Поиск по номеру договора...">
            </div>
            
            <div id="contractsList"></div>
        </div>

        <div id="contractModal" style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); 
             background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); 
             z-index: 1000; width: 500px; max-width: 90%; max-height: 80%; overflow-y: auto;">
            <h3 id="modalTitle">Детали договора</h3>
            <div id="contractDetails"></div>
            <div class="form-actions">
                <button class="btn btn-primary" onclick="printContract()">🖨️ Печать</button>
                <button class="btn btn-secondary" onclick="closeContractModal()">Закрыть</button>
            </div>
        </div>
        <div id="modalOverlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999;"></div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        if (!user) {
            window.location.href = 'login.html';
        }
        if (user.role !== 'agency') {
            const redirects = {
                'admin': 'dashboard.html',
                'shop_manager': 'shop_dashboard.html',
                'security': 'security_dashboard.html',
                'hr_specialist': 'hr_dashboard.html'
            };
            window.location.href = redirects[user.role] || 'dashboard.html';
        }

        let allContracts = [];
        let currentContractId = null;

        async function loadContracts() {
            try {
                const response = await fetch(`api/contracts.php?agency_id=${user.agency_id}`);
                allContracts = await response.json();
                updateStats();
                displayContracts(allContracts);
            } catch (error) {
                showError('Ошибка загрузки договоров');
            }
        }

        function updateStats() {
            const active = allContracts.filter(c => c.status === 'active').length;
            const today = new Date();
            const expiring = allContracts.filter(c => {
                if (c.status !== 'active' || !c.expiration_date) return false;
                const expDate = new Date(c.expiration_date);
                const daysLeft = Math.floor((expDate - today) / (1000 * 60 * 60 * 24));
                return daysLeft > 0 && daysLeft < 30;
            }).length;
            
            document.getElementById('activeCount').textContent = active;
            document.getElementById('expiringCount').textContent = expiring;
        }

        function displayContracts(contracts) {
            const container = document.getElementById('contractsList');
            
            if (contracts.length === 0) {
                container.innerHTML = '<p class="alert alert-info">📭 Нет договоров</p>';
                return;
            }
            
            container.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>№ договора</th>
                            <th>Заказчик</th>
                            <th>Дата подписания</th>
                            <th>Срок действия</th>
                            <th>Сумма</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${contracts.map(c => `
                            <tr>
                                <td><strong>${escapeHtml(c.number) || 'б/н'}</strong></td>
                                <td>${escapeHtml(c.agency_name) || '-'}</td>
                                <td>${c.signing_date || '-'}</td>
                                <td>
                                    ${c.expiration_date || 'Бессрочно'}
                                    ${getExpiringBadge(c)}
                                </td>
                                <td>${formatMoney(c.total_amount)}</td>
                                <td>${getStatusBadge(c.status)}</td>
                                <td class="actions">
                                    <button class="btn btn-sm btn-info" onclick="viewContract(${c.id})">👁️</button>
                                    <button class="btn btn-sm btn-primary" onclick="printContract(${c.id})">🖨️</button>
                                 </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        function getExpiringBadge(contract) {
            if (contract.status !== 'active' || !contract.expiration_date) return '';
            const today = new Date();
            const expDate = new Date(contract.expiration_date);
            const daysLeft = Math.floor((expDate - today) / (1000 * 60 * 60 * 24));
            if (daysLeft > 0 && daysLeft < 30) {
                return `<span class="badge badge-warning">${daysLeft} дн.</span>`;
            }
            return '';
        }

        function getStatusBadge(status) {
            const badges = {
                'active': '<span class="badge badge-success">Активен</span>',
                'draft': '<span class="badge badge-secondary">Черновик</span>',
                'expired': '<span class="badge badge-danger">Истек</span>',
                'terminated': '<span class="badge badge-secondary">Расторгнут</span>'
            };
            return badges[status] || '<span class="badge badge-secondary">' + status + '</span>';
        }

        async function viewContract(id) {
            currentContractId = id;
            const contract = allContracts.find(c => c.id == id);
            if (!contract) return;
            
            const servicesRes = await fetch(`api/contract-services.php?contract_id=${id}`);
            const services = await servicesRes.json();
            
            let servicesHtml = '';
            let total = 0;
            if (services.length > 0) {
                servicesHtml = `
                    <h4>Услуги:</h4>
                    <table class="table">
                        <thead><tr><th>Услуга</th><th>Цена</th><th>Кол-во</th><th>Сумма</th></tr></thead>
                        <tbody>
                            ${services.map(s => {
                                const sum = s.price * s.quantity;
                                total += sum;
                                return `<tr><td>${escapeHtml(s.service_name)}</td><td>${formatMoney(s.price)}</td><td>${s.quantity}</td><td>${formatMoney(sum)}</td></tr>`;
                            }).join('')}
                        </tbody>
                        <tfoot><tr class="total-row"><td colspan="3"><strong>Итого:</strong></td><td><strong>${formatMoney(total)}</strong></td></tr></tfoot>
                    </table>
                `;
            }
            
            const modalContent = `
                <table class="info-table">
                    <tr><th>Номер договора:</th><td>${escapeHtml(contract.number) || 'б/н'}</td></tr>
                    <tr><th>Заказчик:</th><td>${escapeHtml(contract.agency_name) || '-'}</td></tr>
                    <tr><th>Дата подписания:</th><td>${contract.signing_date || '-'}</td></tr>
                    <tr><th>Срок действия:</th><td>${contract.expiration_date || 'Бессрочно'}</td></tr>
                    <tr><th>Статус:</th><td>${getStatusBadge(contract.status)}</td></tr>
                    <tr><th>Общая сумма:</th><td><strong>${formatMoney(contract.total_amount)}</strong></td></tr>
                    <tr><th>Дата создания:</th><td>${formatDate(contract.created_at)}</td></tr>
                </table>
                ${servicesHtml}
                ${contract.terms ? `<h4>Условия:</h4><p>${escapeHtml(contract.terms)}</p>` : ''}
                ${contract.notes ? `<h4>Примечания:</h4><p>${escapeHtml(contract.notes)}</p>` : ''}
            `;
            
            document.getElementById('modalTitle').textContent = `Договор ${contract.number || 'б/н'}`;
            document.getElementById('contractDetails').innerHTML = modalContent;
            document.getElementById('contractModal').style.display = 'block';
            document.getElementById('modalOverlay').style.display = 'block';
        }

        function closeContractModal() {
            document.getElementById('contractModal').style.display = 'none';
            document.getElementById('modalOverlay').style.display = 'none';
            currentContractId = null;
        }

        function printContract() {
            if (currentContractId) {
                window.open(`contract-print.html?id=${currentContractId}`, '_blank');
            }
        }

        // Применение фильтров
        function applyFilters() {
            const status = document.getElementById('statusFilter').value;
            const dateFrom = document.getElementById('dateFrom').value;
            const dateTo = document.getElementById('dateTo').value;
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            let filtered = [...allContracts];
            
            if (status) filtered = filtered.filter(c => c.status === status);
            if (dateFrom) filtered = filtered.filter(c => c.signing_date >= dateFrom);
            if (dateTo) filtered = filtered.filter(c => c.signing_date <= dateTo);
            if (search) filtered = filtered.filter(c => c.number && c.number.toLowerCase().includes(search));
            
            displayContracts(filtered);
        }

        function resetFilters() {
            document.getElementById('statusFilter').value = '';
            document.getElementById('dateFrom').value = '';
            document.getElementById('dateTo').value = '';
            document.getElementById('searchInput').value = '';
            displayContracts(allContracts);
        }

        function exportToCSV() {
            const status = document.getElementById('statusFilter').value;
            const filtered = status ? allContracts.filter(c => c.status === status) : allContracts;
            
            if (filtered.length === 0) {
                showError('Нет данных для экспорта');
                return;
            }
            
            let csv = "№ договора;Заказчик;Дата подписания;Срок действия;Статус;Сумма\n";
            filtered.forEach(c => {
                csv += `${c.number || 'б/н'};${c.agency_name || ''};${c.signing_date || ''};${c.expiration_date || 'Бессрочно'};${c.status};${c.total_amount || 0}\n`;
            });
            
            const blob = new Blob(["\uFEFF" + csv], { type: "text/csv;charset=utf-8;" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `agency_contracts_${new Date().toISOString().split('T')[0]}.csv`;
            link.click();
            showSuccess('Экспорт выполнен');
        }

        document.getElementById('searchInput').addEventListener('input', applyFilters);
        
        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        loadContracts();
        setInterval(loadContracts, 60000);
    </script>

    <style>
        .stats-badge {
            display: flex;
            gap: 1rem;
            align-items: center;
            background: #f8f9fa;
            padding: 0.5rem 1rem;
            border-radius: 30px;
        }
        .stats-badge .badge {
            font-size: 1.1rem;
            padding: 0.3rem 0.8rem;
        }
    </style>
</body>
</html>
