<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>График работы | Охрана</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">HR CRM | Охрана</div>
        <div class="nav-menu">
            <a href="security_dashboard.html">Главная</a>
            <a href="security_schedule.html" class="active">График работы</a>
            <a href="security_attendance.html">Отметка прихода/ухода</a>
            <a href="security_requests.html">Заявки</a>
            <a href="security_reports.html">Отчеты</a>
            <a href="profile.html">Профиль</a>
            <a href="#" id="logoutBtn">Выход</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>График работы внешнего персонала</h1>
            <div>
                <input type="date" id="datePicker" value="">
                <button class="btn btn-primary" onclick="loadSchedule()">Показать</button>
                <button class="btn btn-secondary" onclick="loadWeekSchedule()">Текущая неделя</button>
            </div>
        </div>

        <div class="card">
            <div id="scheduleTable"></div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        const user = checkAuth();
        if (user.role !== 'security') window.location.href = 'dashboard.html';

        document.getElementById('datePicker').value = new Date().toISOString().split('T')[0];

        async function loadSchedule() {
            const date = document.getElementById('datePicker').value;
            const response = await fetch(`api/work_schedule.php?organization_id=${user.organization_id}&date=${date}`);
            const schedules = await response.json();
            
            const container = document.getElementById('scheduleTable');
            if (schedules.length === 0) {
                container.innerHTML = '<p class="alert alert-info">На выбранную дату нет запланированных выходов</p>';
                return;
            }
            
            container.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Сотрудник</th>
                            <th>Должность</th>
                            <th>От какого агентства</th>
                            <th>План прихода</th>
                            <th>План ухода</th>
                            <th>Факт прихода</th>
                            <th>Факт ухода</th>
                            <th>Статус</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${schedules.map(s => `
                            <tr>
                                <td><strong>${s.full_name}</strong></td>
                                <td>${s.position || '-'}</td>
                                <td>${s.agency_name || '-'}</td>
                                <td>${s.planned_start || '-'}</td>
                                <td>${s.planned_end || '-'}</td>
                                <td>${s.actual_start || '<span class="badge badge-warning">-</span>'}</td>
                                <td>${s.actual_end || '<span class="badge badge-warning">-</span>'}</td>
                                <td>
                                    ${s.status === 'confirmed' ? '<span class="badge badge-success">Отмечен</span>' : 
                                      s.status === 'absent' ? '<span class="badge badge-danger">Отсутствовал</span>' :
                                      '<span class="badge badge-warning">Ожидает</span>'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        async function loadWeekSchedule() {
            const today = new Date();
            const weekDates = [];
            for (let i = 0; i < 7; i++) {
                const date = new Date(today);
                date.setDate(today.getDate() + i);
                weekDates.push(date.toISOString().split('T')[0]);
            }
            
            let allSchedules = [];
            for (const date of weekDates) {
                const response = await fetch(`api/work_schedule.php?organization_id=${user.organization_id}&date=${date}`);
                const schedules = await response.json();
                allSchedules = [...allSchedules, ...schedules.map(s => ({...s, schedule_date: date}))];
            }
            
            const container = document.getElementById('scheduleTable');
            if (allSchedules.length === 0) {
                container.innerHTML = '<p class="alert alert-info">На текущую неделю нет запланированных выходов</p>';
                return;
            }
            
            container.innerHTML = `
                <table class="table">
                    <thead>
                        <tr>
                            <th>Дата</th>
                            <th>Сотрудник</th>
                            <th>Должность</th>
                            <th>План прихода</th>
                            <th>План ухода</th>
                            <th>Факт прихода</th>
                            <th>Факт ухода</th>
                            <th>Статус</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${allSchedules.map(s => `
                            <tr>
                                <td>${s.schedule_date}</td>
                                <td>${s.full_name}</td>
                                <td>${s.position || '-'}</td>
                                <td>${s.planned_start || '-'}</td>
                                <td>${s.planned_end || '-'}</td>
                                <td>${s.actual_start || '-'}</td>
                                <td>${s.actual_end || '-'}</td>
                                <td>
                                    ${s.status === 'confirmed' ? '<span class="badge badge-success">✓</span>' : 
                                      '<span class="badge badge-warning">⏳</span>'}
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            `;
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        loadSchedule();
    </script>
</body>
</html>
