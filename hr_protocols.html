<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Протоколы согласования цен | HR CRM</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="navbar">
        <div class="nav-brand">HR CRM</div>
        <div class="nav-menu">
            <a href="hr_dashboard.html">Главная</a>
            <a href="hr_staff.html">Реестр персонала</a>
            <a href="hr_requests.html">Заявки</a>
            <a href="hr_protocols.html" class="active">Протоколы цен</a>
            <a href="profile.html">Профиль</a>
            <a href="#" id="logoutBtn">Выход</a>
        </div>
    </div>

    <div class="container">
        <div class="page-header">
            <h1>Протоколы согласования цен</h1>
            <button class="btn btn-success" onclick="showAddProtocolForm()">+ Добавить протокол</button>
        </div>
        
        <div id="errorMessage" class="alert alert-error" style="display: none;"></div>
        <div id="successMessage" class="alert alert-success" style="display: none;"></div>

        <!-- Форма добавления протокола -->
        <div id="protocolForm" class="card" style="display: none;">
            <h3 id="formTitle">Добавление протокола</h3>
            <form id="protocolFormElement" onsubmit="event.preventDefault(); saveProtocol();">
                <div class="form-row">
                    <div class="form-group">
                        <label>Номер протокола *</label>
                        <input type="text" id="protocolNumber" required>
                    </div>
                    <div class="form-group">
                        <label>Дата подписания *</label>
                        <input type="date" id="signingDate" required>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>Кадровое агентство *</label>
                    <select id="agencyId" required></select>
                </div>
                
                <div class="form-group">
                    <label>Файл протокола (XLS/XLSX)</label>
                    <input type="file" id="protocolFile" accept=".xls,.xlsx">
                    <small class="form-text">Загрузите файл с ценами в формате Excel</small>
                </div>
                
                <div class="form-group">
                    <label>Примечания</label>
                    <textarea id="notes" rows="3"></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-success">Сохранить</button>
                    <button type="button" class="btn btn-secondary" onclick="hideProtocolForm()">Отмена</button>
                </div>
            </form>
        </div>

        <!-- Список протоколов -->
        <div class="card">
            <div class="filters">
                <select id="agencyFilter">
                    <option value="">Все агентства</option>
                </select>
                <select id="statusFilter">
                    <option value="">Все статусы</option>
                    <option value="draft">Черновики</option>
                    <option value="approved">Утверждены</option>
                    <option value="rejected">Отклонены</option>
                </select>
                <button class="btn btn-primary" onclick="applyFilters()">Применить</button>
                <button class="btn btn-secondary" onclick="resetFilters()">Сбросить</button>
            </div>
            
            <div style="overflow-x: auto;">
                <table class="table">
                    <thead>
                        <tr>
                            <th>№ протокола</th>
                            <th>Агентство</th>
                            <th>Дата подписания</th>
                            <th>Действует с</th>
                            <th>Файл</th>
                            <th>Статус</th>
                            <th>Действия</th>
                        </tr>
                    </thead>
                    <tbody id="protocolsList">
                        <tr><td colspan="7" class="text-center">Загрузка...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="js/utils.js"></script>
    <script>
        const user = checkAuth();
        if (user.role !== 'hr_specialist' && user.role !== 'admin') {
            window.location.href = 'dashboard.html';
        }

        let allProtocols = [];
        let agencies = [];

        async function loadDictionaries() {
            const agenciesRes = await fetch('api/agencies.php?active=1');
            agencies = await agenciesRes.json();
            
            const agencySelect = document.getElementById('agencyId');
            const agencyFilter = document.getElementById('agencyFilter');
            
            agencySelect.innerHTML = '<option value="">Выберите агентство</option>' + 
                agencies.map(a => `<option value="${a.id}">${escapeHtml(a.name)}</option>`).join('');
            
            agencyFilter.innerHTML = '<option value="">Все агентства</option>' + 
                agencies.map(a => `<option value="${a.id}">${escapeHtml(a.name)}</option>`).join('');
        }

        async function loadProtocols() {
            try {
                const response = await fetch('api/price_protocols.php');
                allProtocols = await response.json();
                displayProtocols(allProtocols);
            } catch (error) {
                showError('Ошибка загрузки протоколов');
            }
        }

        function displayProtocols(protocols) {
            const tbody = document.getElementById('protocolsList');
            
            if (protocols.length === 0) {
                tbody.innerHTML = '</tr><td colspan="7" class="text-center">Нет данных</td></tr>';
                return;
            }
            
            tbody.innerHTML = protocols.map(p => `
                <tr>
                    <td><strong>${escapeHtml(p.protocol_number)}</strong></td>
                    <td>${escapeHtml(p.agency_name) || '-'}</td>
                    <td>${p.signing_date || '-'}</td>
                    <td>${p.valid_from || '-'}</td>
                    <td>
                        ${p.file_name ? `<a href="uploads/${p.file_name}" target="_blank">📎 ${p.file_name}</a>` : '-'}
                    </td>
                    <td>
                        <span class="badge ${p.status === 'approved' ? 'badge-success' : (p.status === 'rejected' ? 'badge-danger' : 'badge-warning')}">
                            ${p.status === 'approved' ? 'Утвержден' : (p.status === 'rejected' ? 'Отклонен' : 'Черновик')}
                        </span>
                    </td>
                    <td class="actions">
                        <button class="btn btn-sm btn-info" onclick="viewProtocol(${p.id})">👁️</button>
                        ${p.status === 'draft' ? `
                            <button class="btn btn-sm btn-success" onclick="approveProtocol(${p.id})">✓ Утвердить</button>
                            <button class="btn btn-sm btn-danger" onclick="rejectProtocol(${p.id})">✗ Отклонить</button>
                        ` : ''}
                        <button class="btn btn-sm btn-danger" onclick="deleteProtocol(${p.id})">🗑️</button>
                    </td>
                </tr>
            `).join('');
        }

        function showAddProtocolForm() {
            document.getElementById('protocolForm').style.display = 'block';
            document.getElementById('protocolNumber').value = '';
            document.getElementById('signingDate').value = new Date().toISOString().split('T')[0];
            document.getElementById('protocolFile').value = '';
            document.getElementById('notes').value = '';
        }

        function hideProtocolForm() {
            document.getElementById('protocolForm').style.display = 'none';
        }

        async function saveProtocol() {
            const formData = new FormData();
            formData.append('protocol_number', document.getElementById('protocolNumber').value);
            formData.append('agency_id', document.getElementById('agencyId').value);
            formData.append('signing_date', document.getElementById('signingDate').value);
            formData.append('notes', document.getElementById('notes').value);
            formData.append('created_by', user.id);
            
            const file = document.getElementById('protocolFile').files[0];
            if (file) {
                formData.append('file', file);
            }
            
            try {
                const response = await fetch('api/price_protocols.php', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                
                if (result.success) {
                    showSuccess('Протокол добавлен');
                    hideProtocolForm();
                    loadProtocols();
                } else {
                    showError(result.error || 'Ошибка сохранения');
                }
            } catch (error) {
                showError('Ошибка подключения к серверу');
            }
        }

        function viewProtocol(id) {
            const protocol = allProtocols.find(p => p.id == id);
            if (protocol) {
                alert(`
                    Протокол №${protocol.protocol_number}
                    Агентство: ${protocol.agency_name}
                    Дата подписания: ${protocol.signing_date}
                    Действует с: ${protocol.valid_from}
                    Статус: ${protocol.status === 'approved' ? 'Утвержден' : (protocol.status === 'rejected' ? 'Отклонен' : 'Черновик')}
                    ${protocol.notes ? 'Примечания: ' + protocol.notes : ''}
                `);
            }
        }

        async function approveProtocol(id) {
            if (!confirm('Утвердить протокол? Цены будут обновлены в прейскуранте.')) return;
            
            try {
                const response = await fetch('api/price_protocols.php', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, status: 'approved', approved_by: user.id })
                });
                
                const result = await response.json();
                if (result.success) {
                    showSuccess('Протокол утвержден');
                    loadProtocols();
                } else {
                    showError(result.error || 'Ошибка');
                }
            } catch (error) {
                showError('Ошибка подключения к серверу');
            }
        }

        async function rejectProtocol(id) {
            const reason = prompt('Укажите причину отклонения:');
            if (reason === null) return;
            
            try {
                const response = await fetch('api/price_protocols.php', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: id, status: 'rejected', notes: reason })
                });
                
                const result = await response.json();
                if (result.success) {
                    showSuccess('Протокол отклонен');
                    loadProtocols();
                } else {
                    showError(result.error || 'Ошибка');
                }
            } catch (error) {
                showError('Ошибка подключения к серверу');
            }
        }

        async function deleteProtocol(id) {
            if (!confirm('Вы уверены, что хотите удалить протокол?')) return;
            
            try {
                const response = await fetch(`api/price_protocols.php?id=${id}`, {
                    method: 'DELETE'
                });
                
                const result = await response.json();
                if (result.success) {
                    showSuccess('Протокол удален');
                    loadProtocols();
                } else {
                    showError(result.error || 'Ошибка удаления');
                }
            } catch (error) {
                showError('Ошибка подключения к серверу');
            }
        }

        function applyFilters() {
            const agencyId = document.getElementById('agencyFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            let filtered = [...allProtocols];
            
            if (agencyId) filtered = filtered.filter(p => p.agency_id == agencyId);
            if (status) filtered = filtered.filter(p => p.status === status);
            
            displayProtocols(filtered);
        }

        function resetFilters() {
            document.getElementById('agencyFilter').value = '';
            document.getElementById('statusFilter').value = '';
            displayProtocols(allProtocols);
        }

        document.getElementById('logoutBtn').addEventListener('click', (e) => {
            e.preventDefault();
            logout();
        });

        // Установка даты по умолчанию
        document.getElementById('signingDate').value = new Date().toISOString().split('T')[0];

        loadDictionaries();
        loadProtocols();
    </script>
</body>
</html>
